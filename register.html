<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- Latest compiled and minified CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Latest compiled JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body>
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-lg-6 border shadow p-3">
          <center><h5>Register</h5>
          <p> create your accound it's free and only takes a minute </p></center>
          <form action="">
            <div class="row">
              <div class="col-lg-6 mb-3">
                <label for="">First Name</label>
                <input type="text" name="" id="" class="form-control" />
              </div>
              <div class="col-lg-6 mb-3">
                <label for="">Last Name</label>
                <input type="text" name="" id="" class="form-control" />
              </div>

              <div class="col-lg-12 mb-3">
                <label for="">Email Address</label>
                <input type="email" name="" id="" class="form-control" />
              </div>

              <div class="col-lg-12 mb-3">
                <label for="">Password </label>
                <input type="number" name="" id="" class="form-control" />
              </div>

              <div class="col-lg-12 mb-3">
                <label for="">confirm password </label>
                <textarea name="" id="" class="form-control"></textarea>

              <td>
                <input type="checkbox" name="gender" id="">
              </td>
           
              <label for="">I accept the trems of use & privacy policy.</label>
              </div>
              </div>
              <div>
                <button type="button" class="btn btn-primary">Register now </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
    <center><div class="sign in">
      already have an account?
      <a href="#"> sign in</a>
    </div></center>
  </body>
</html>
