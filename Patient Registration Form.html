<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <!-- Latest compiled and minified CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Latest compiled JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
   <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-lg-6 border shadow p-3">
          <center><h5>Patient Registraction Form</h5>
          <p>Please fill in details to regitor as a new patient </p></center>
          <form action="">
            <div class="row">
              <div class="col-lg-6 mb-3">
                <label for="">First Name</label>
                <input type="text" name="" id="" class="form-control" />
              </div>
              <div class="col-lg-6 mb-3">
                <label for="">Last Name</label>
                <input type="text" name="" id="" class="form-control" />
              </div>

              <div class="col-lg-12 mb-3">
                <label for="">Date of Birth</label>
                <input type="date" name="" id="" class="form-control" />
              </div>

              <div class="col-lg-12 mb-3">

        
            <label for=""> Gender </label><br>
            <input type="radio" name="" id="" />Female
            <input type="radio" name="" id="" />Male
            <input type="radio" name="" id="" />Other
            </div>

              <div class="col-lg-12 mb-3">
                <label for=""> Email Address </label>
                  <input type="email" name="" id="" class="form-control" />
              </div>
           
               <div class="col-lg-12 mb-3">
                <label for=""> Phone Number </label>
                  <input type="number" name="" id="" class="form-control" />
              </div>
             <div class="col-lg-12 mb-3">
                <label for="">Address</label>
                <textarea name="" id="" class="form-control"></textarea>
              </div>
              <div class="col-lg-12 mb-3">
                <label for=""> Emergency Contact Number </label>
                  <input type="number" name="" id="" class="form-control" />
              </div>
              <div>
               <td>
                <input type="checkbox" name="gender" id="">
              </td>
              <label for="">I consent to the processing of my personal data in accordance with the privacy policy.</label>
              </div>
              <div>
                <button type="button" class="btn btn-primary">Register  </button>
              </div>
          </form>
        </div>
      </div>
    </div>
   
</body>
</html>
